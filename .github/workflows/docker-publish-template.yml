name: Build and Push Docker Image to ACR (Reusable)

on:
  workflow_call:
    inputs:
      mcp_server:
        required: true
        type: string
      image_name:
        required: true
        type: string
      docker_context:
        required: false
        type: string
        default: MCPServers/${{ inputs.mcp_server }}
      environment:
        required: true
        type: string
        description: "'dev' or 'prod'"
    outputs:
      image_tag:
        description: "The image tag that was built (dev) or promoted (prod)"
        value: ${{ jobs.build-and-push.outputs.image_tag }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_tag: ${{ steps.context.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set deployment context
        id: context
        run: |
          if [ "${{ inputs.environment }}" = "prod" ]; then
            IMAGE_TAG="${GITHUB_REF##*/}"
          else
            IMAGE_TAG="latest"
          fi
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "source_image_tag=sha-${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Set ACR_NAME env var
        run: echo "ACR_NAME=${{ vars.ACR_NAME }}" >> $GITHUB_ENV

      - name: Set REGISTRY env var
        run: echo "REGISTRY=${ACR_NAME}.azurecr.io" >> $GITHUB_ENV

      - name: Log in to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        uses: azure/docker-login@15c4aadf093404726ab2ff205b2cdd33fa6d054c # v2
        with:
          login-server: ${{ env.REGISTRY }}
          username: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
          password: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}

      - name: Build and push Docker image
        if: ${{ inputs.environment == 'dev' }}
        run: |
          docker build \
            -f ${{ inputs.docker_context }}/${{ inputs.mcp_server }}/Dockerfile \
            -t $REGISTRY/${{ inputs.image_name }}:latest \
            -t $REGISTRY/${{ inputs.image_name }}:sha-${GITHUB_SHA} \
            ${{ inputs.docker_context }}
          docker push $REGISTRY/${{ inputs.image_name }}:latest
          docker push $REGISTRY/${{ inputs.image_name }}:sha-${GITHUB_SHA}

      - name: Retag dev image for production
        if: ${{ inputs.environment == 'prod' && steps.context.outputs.image_tag != steps.context.outputs.source_image_tag }}
        run: |
          az acr import \
            --name $ACR_NAME \
            --source $REGISTRY/${{ inputs.image_name }}:${{ steps.context.outputs.source_image_tag }} \
            --image ${{ inputs.image_name }}:${{ steps.context.outputs.image_tag }} \
            --force

      - name: Validate production image exists in ACR
        if: ${{ inputs.environment == 'prod' }}
        run: |
          az acr repository show \
            --name $ACR_NAME \
            --image ${{ inputs.image_name }}:${{ steps.context.outputs.image_tag }} \
            --output none
