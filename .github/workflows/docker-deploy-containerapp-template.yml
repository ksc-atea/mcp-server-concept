name: Docker Deploy Container App

on:
  workflow_call:
    inputs:
      parameter_file_name:
        required: true
        type: string
      environment:
        required: false
        type: string
        default: dev
        description: "'dev' or 'prod'"
      image_tag:
        required: false
        type: string
        default: latest
        description: "The image tag to deploy"

jobs:
  deployment:
    name: "Deploy Container App"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deployment
        uses: azure/bicep-deploy@4d5dc29bf04d05546dd5df9c665c54b9c5213207 # v2.2.0
        with:
          type: deployment
          operation: create
          name: ${{ inputs.environment == 'prod' && 'Production' || 'Development' }}
          location: westeurope
          scope: subscription
          subscription-id: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}
          template-file: ./Infrastructure/containerApp.bicep
          parameters-file: ./Infrastructure/${{ inputs.parameter_file_name }}
          parameters: '{"imageTag": "${{ inputs.image_tag }}"}'
