name: Build and Push Docker Image to ACR (Reusable)

on:
  workflow_call:
    inputs:
      mcp_server:
        required: true
        type: string
      image_name:
        required: true
        type: string
      docker_context:
        required: false
        type: string
        default: MCPServers/${{ inputs.mcp_server }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set ACR_NAME based on branch
        id: set_acr
        run: |
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            echo "ACR_NAME=${{ vars.ACR_NAME_PROD }}" >> $GITHUB_ENV
          else
            echo "ACR_NAME=${{ vars.ACR_NAME_DEV }}" >> $GITHUB_ENV
          fi

      - name: Set REGISTRY env var
        run: echo "REGISTRY=${ACR_NAME}.azurecr.io" >> $GITHUB_ENV

      - name: Set IMAGE_NAME
        run: echo "IMAGE_NAME=${{ inputs.image_name }}" >> $GITHUB_ENV

      - name: Set IMAGE_TAG to latest
        run: echo "IMAGE_TAG=latest" >> $GITHUB_ENV

      - name: Log in to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        uses: azure/docker-login@15c4aadf093404726ab2ff205b2cdd33fa6d054c # v2
        with:
          login-server: ${{ env.REGISTRY }}
          username: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
          password: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}

      - name: Build Docker image
        run: |
          docker build -f ${{ inputs.docker_context }}/${{ inputs.mcp_server }}/Dockerfile -t $REGISTRY/$IMAGE_NAME:$IMAGE_TAG ${{ inputs.docker_context }}

      - name: Push Docker image to ACR
        run: |
          docker push $REGISTRY/$IMAGE_NAME:$IMAGE_TAG
